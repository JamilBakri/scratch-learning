<!DOCTYPE html>
<html>
<head>
<title>🚀 Scratch Learning ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #111, #1f1f1f);
  color: white;
  margin: 0;
}

.header {
  background: #ff7b00;
  padding: 20px;
  text-align: center;
  font-size: 26px;
}

.card {
  background: #222;
  padding: 20px;
  margin: 15px auto;
  border-radius: 15px;
  width: 90%;
  max-width: 700px;
}

button {
  padding: 10px;
  margin: 5px;
  background: #ff7b00;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

iframe, canvas {
  width: 100%;
  border-radius: 10px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 80%;
}

#levelUp {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: gold;
  color: black;
  padding: 20px;
  border-radius: 15px;
  display: none;
}
</style>
</head>

<body>

<div class="header">🚀 Scratch Learning ULTIMATE</div>
<div id="levelUp">🎉 LEVEL UP!</div>

<div class="card">
<h2>👤 Profile</h2>
<img src="jamil.jpg" width="120">
<p><b>Jamil Bakri</b></p>
<p id="xp"></p>
<p id="badge"></p>
</div>

<div class="card">
<h2>🎥 Learn Scratch</h2>
<iframe height="300" src="https://www.youtube.com/embed/zOa5o9Yq_ZU"></iframe>
</div>

<div class="card">
<h2>🎮 Shooting Game</h2>
<canvas id="game" height="300"></canvas>
<p>⬅️➡️ Move | SPACE Shoot</p>
<p id="score">Score: 0</p>
</div>

<div class="card">
<h2>🧑‍🏫 Lessons</h2>
<button onclick="startLesson(1)">Game</button>
<button onclick="startLesson(2)">Animation</button>
<button onclick="startLesson(3)">Story</button>
<div id="lesson"></div>
<button onclick="nextStep()">Next</button>
</div>

<div class="card">
<h2>🧠 Quiz</h2>

<p>Scratch is?</p>
<input type="radio" name="q1" id="q1a"> Programming<br>
<input type="radio" name="q1"> Game<br>

<p>Coding uses?</p>
<input type="radio" name="q2"> Mouse<br>
<input type="radio" name="q2" id="q2b"> Blocks<br><br>

<input id="name" placeholder="Your name"><br><br>
<button onclick="quiz()">Submit</button>
<p id="result"></p>
</div>

<div class="card">
<h2>🎯 Daily Mission</h2>
<p id="daily"></p>
<button onclick="completeDaily()">Complete</button>
</div>

<div class="card">
<h2>🌍 Leaderboard</h2>
<button onclick="loadBoard()">Load</button>
<div id="board"></div>
</div>

<audio id="click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR KEY",
  authDomain: "YOUR PROJECT.firebaseapp.com",
  projectId: "YOUR PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveScoreOnline = async (name, score) => {
  await addDoc(collection(db, "scores"), { name, score });
};

window.loadBoard = async () => {
  let board = document.getElementById("board");
  board.innerHTML="";
  const snap = await getDocs(collection(db, "scores"));
  let arr=[];
  snap.forEach(d=>arr.push(d.data()));
  arr.sort((a,b)=>b.score-a.score);
  arr.forEach((d,i)=>{
    let medal=["🥇","🥈","🥉"][i]||"";
    board.innerHTML+=`<p>${medal} ${d.name}: ${d.score}</p>`;
  });
};
</script>

<script>
let xp=parseInt(localStorage.getItem("xp")||0);
let level=Math.floor(xp/10)+1;
let oldLevel=level;

function update(){
document.getElementById("xp").innerText="XP:"+xp+" Level:"+level;
let b="🏅 Beginner";
if(level>=3)b="🥈 Pro";
if(level>=5)b="🥇 Master";
document.getElementById("badge").innerText=b;
}
update();

function save(){
localStorage.setItem("xp",xp);
let newLevel=Math.floor(xp/10)+1;
if(newLevel>oldLevel){
document.getElementById("levelUp").style.display="block";
setTimeout(()=>{document.getElementById("levelUp").style.display="none";},2000);
oldLevel=newLevel;
}
level=newLevel;
update();
}

// LESSONS
let lessons={
1:[{t:"Sprite",i:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Scratch_cat.png",m:"Add sprite"},
   {t:"Move",i:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Scratch_move_block.png",m:"Move"},
   {t:"Flag",i:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Scratch_event_block.png",m:"Start"}],
};

let cur=[],step=0;

function startLesson(n){
cur=lessons[n]||lessons[1];
step=0;
show();
}

function nextStep(){
step++;
if(step<cur.length){xp++;show();}
else{xp+=5;document.getElementById("lesson").innerHTML="Done";}
save();
}

function show(){
let s=cur[step];
document.getElementById("lesson").innerHTML=`<h3>${s.t}</h3><img src="${s.i}" width=100><br>${s.m}`;
}

// QUIZ
function quiz(){
let s=0;
if(q1a.checked)s++;
if(q2b.checked)s++;
xp+=s*5;
let name=document.getElementById("name").value;
save();
saveScoreOnline(name,xp);
document.getElementById("result").innerText="Score:"+s;
}

// DAILY
let d=["Make sprite","Add move","Add sound"];
document.getElementById("daily").innerText=d[new Date().getDate()%3];

function completeDaily(){xp+=3;save();}

// GAME
let c=document.getElementById("game");
let ctx=c.getContext("2d");
let p={x:130,y:260};
let bullets=[],enemies=[],score=0;

setInterval(()=>{enemies.push({x:Math.random()*260,y:0})},1000);

function draw(){
ctx.clearRect(0,0,300,300);
ctx.fillStyle="orange";ctx.fillRect(p.x,p.y,40,20);

ctx.fillStyle="yellow";
bullets.forEach((b,i)=>{b.y-=5;ctx.fillRect(b.x,b.y,5,10);if(b.y<0)bullets.splice(i,1);});

ctx.fillStyle="red";
enemies.forEach((e,ei)=>{
e.y+=2;ctx.fillRect(e.x,e.y,20,20);
bullets.forEach((b,bi)=>{
if(b.x<e.x+20&&b.x+5>e.x&&b.y<e.y+20&&b.y+10>e.y){
enemies.splice(ei,1);bullets.splice(bi,1);score++;
document.getElementById("score").innerText="Score:"+score;
}});
if(e.y>300){score=0;enemies=[];bullets=[];}
});
requestAnimationFrame(draw);
}

document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowLeft")p.x-=10;
if(e.key=="ArrowRight")p.x+=10;
if(e.key==" ")bullets.push({x:p.x+15,y:p.y});
});

draw();
</script>

</body>
</html>
