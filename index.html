<!DOCTYPE html>
<html>
<head>
<title>Scratch Learning</title>
<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; background:#ff7b00; color:white; border-radius:8px; }
.card { background:#222; padding:20px; margin:10px auto; border-radius:10px; max-width:600px; }
input { padding:8px; border-radius:5px; border:none; }
</style>
</head>

<body>

<h1>🎮 Scratch Learning</h1>

<div class="card">
<h2>📚 About Scratch</h2>
<p>Scratch is a fun programming language where you create games and animations using blocks.</p>
<p>Coding helps you think, solve problems, and create amazing projects!</p>
</div>

<div class="card">
<h2>🧠 Quiz</h2>

<p>1. Scratch is?</p>
<input type="radio" name="q1" id="q1a"> Programming Language<br>
<input type="radio" name="q1"> Game<br>

<p>2. Coding uses?</p>
<input type="radio" name="q2"> Mouse<br>
<input type="radio" name="q2" id="q2b"> Blocks<br><br>

<input id="username" placeholder="Enter your name"><br><br>

<button onclick="submitScore()">Submit</button>
</div>

<div class="card">
<h2>🏆 Leaderboard</h2>
<button onclick="loadLeaderboard()">Load Scores</button>
<div id="board"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQLdv7vKXNC5H4d8HiGufOH9hUDgbEe5Q",
  authDomain: "scratch-learning-de70f.firebaseapp.com",
  projectId: "scratch-learning-de70f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SUBMIT SCORE
window.submitScore = async () => {
  let score = 0;
  if(document.getElementById("q1a").checked) score++;
  if(document.getElementById("q2b").checked) score++;

  let name = document.getElementById("username").value;

  if(name === ""){
    alert("Enter your name!");
    return;
  }

  await addDoc(collection(db, "scores"), {
    name: name,
    score: score
  });

  alert("Score saved!");
}

// LOAD LEADERBOARD
window.loadLeaderboard = async () => {
  let board = document.getElementById("board");
  board.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "scores"));
  querySnapshot.forEach(doc => {
    let d = doc.data();
    board.innerHTML += `<p>${d.name}: ${d.score}</p>`;
  });
}
</script>

</body>
</html>
