<!DOCTYPE html>
<html>
<head>
<title>Scratch Learning PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #111, #1f1f1f);
  color: white;
  margin: 0;
}

.header {
  background: #ff7b00;
  padding: 20px;
  text-align: center;
  font-size: 28px;
}

.card {
  background: #222;
  padding: 20px;
  margin: 15px auto;
  border-radius: 15px;
  width: 90%;
  max-width: 700px;
  box-shadow: 0 0 10px rgba(255,123,0,0.3);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 0 0 20px rgba(255,123,0,0.8);
}

button {
  padding: 12px;
  margin: 5px;
  background: #ff7b00;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 80%;
}

iframe {
  width: 100%;
  height: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">🚀 Scratch Learning PRO+</div>

<div class="card">
<h2>👤 Profile</h2>
<img src="jamil.jpg" width="120">
<p><b>Jamil Bakri</b></p>
<p>Scratch Instructor</p>
</div>

<div class="card">
<h2>🎮 Game</h2>
<iframe src="https://scratch.mit.edu/projects/10128407/embed"></iframe>
</div>

<div class="card">
<h2>🧠 Quiz</h2>

<p>1. Scratch is?</p>
<input type="radio" name="q1" id="q1a"> Programming Language<br>
<input type="radio" name="q1"> Game<br>

<p>2. Coding uses?</p>
<input type="radio" name="q2"> Mouse<br>
<input type="radio" name="q2" id="q2b"> Blocks<br><br>

<input id="username" placeholder="Enter your name"><br><br>

<button onclick="submitScore()">Submit</button>

<p id="badge"></p>
</div>

<div class="card">
<h2>🏆 Leaderboard</h2>
<button onclick="loadLeaderboard()">Load</button>
<div id="board"></div>
</div>

<div class="card">
<h2>📊 Score History</h2>
<button onclick="loadHistory()">Show History</button>
<div id="history"></div>
</div>

<div class="card">
<button onclick="contact()">📞 Contact</button>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQLdv7vKXNC5H4d8HiGufOH9hUDgbEe5Q",
  authDomain: "scratch-learning-de70f.firebaseapp.com",
  projectId: "scratch-learning-de70f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitScore = async () => {
  document.getElementById("clickSound").play();

  let score = 0;
  if(document.getElementById("q1a").checked) score++;
  if(document.getElementById("q2b").checked) score++;

  let name = document.getElementById("username").value;

  if(name === ""){
    alert("Enter your name!");
    return;
  }

  await addDoc(collection(db, "scores"), {
    name: name,
    score: score
  });

  document.getElementById("winSound").play();

  let badge = "🏅 Beginner";
  if(score == 2) badge = "🥇 Master";
  else if(score == 1) badge = "🥈 Pro";

  document.getElementById("badge").innerText = "Your badge: " + badge;

  alert("Saved!");
}

window.loadLeaderboard = async () => {
  let board = document.getElementById("board");
  board.innerHTML = "";

  const snap = await getDocs(collection(db, "scores"));
  let arr = [];

  snap.forEach(d => arr.push(d.data()));
  arr.sort((a,b)=>b.score-a.score);

  arr.forEach((d,i)=>{
    let medal = ["🥇","🥈","🥉"][i] || "";
    board.innerHTML += `<p>${medal} ${d.name}: ${d.score}</p>`;
  });
}

window.loadHistory = async () => {
  let h = document.getElementById("history");
  h.innerHTML = "";

  const snap = await getDocs(collection(db, "scores"));

  snap.forEach(d=>{
    let data = d.data();
    h.innerHTML += `<p>${data.name} scored ${data.score}</p>`;
  });
}

window.contact = () => {
  alert("Jamil Bakri\n+357 94 020504");
}
</script>

</body>
</html>
