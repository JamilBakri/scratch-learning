<!DOCTYPE html>
<html>
<head>
<title>🚀 Scratch Learning PRO MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #111, #1f1f1f);
  color: white;
  margin: 0;
}

.header {
  background: #ff7b00;
  padding: 20px;
  text-align: center;
  font-size: 28px;
}

.card {
  background: #222;
  padding: 20px;
  margin: 15px auto;
  border-radius: 15px;
  width: 90%;
  max-width: 700px;
  box-shadow: 0 0 10px rgba(255,123,0,0.3);
}

button {
  padding: 10px;
  margin: 5px;
  background: #ff7b00;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">🚀 Scratch Learning PRO MAX</div>

<div class="card">
<h2>👤 Profile</h2>
<img src="jamil.jpg" width="120">
<p><b>Jamil Bakri</b></p>
<p>Scratch Instructor</p>
<p id="xp">XP: 0 | Level: 1</p>
<p id="badge">🏅 Beginner</p>
</div>

<!-- 🎥 VIDEO -->
<div class="card">
<h2>🎥 Learn Scratch</h2>
<iframe src="https://www.youtube.com/embed/zOa5o9Yq_ZU"></iframe>
</div>

<!-- 🎮 MINI GAME -->
<div class="card">
<h2>🎮 Mini Game</h2>
<iframe src="https://scratch.mit.edu/projects/10128407/embed"></iframe>
</div>

<!-- 🧑‍🏫 LESSONS -->
<div class="card">
<h2>🧑‍🏫 Lessons</h2>

<button onclick="startLesson(1)">🎮 Game</button>
<button onclick="startLesson(2)">🎬 Animation</button>
<button onclick="startLesson(3)">📖 Story</button>

<div id="lessonText"></div>
<button onclick="nextStep()">Next ➡️</button>
</div>

<script>
let xp = localStorage.getItem("xp") || 0;
let level = Math.floor(xp / 10) + 1;

updateUI();

function updateUI(){
  document.getElementById("xp").innerText = "XP: " + xp + " | Level: " + level;

  let badge = "🏅 Beginner";
  if(level >= 3) badge = "🥈 Pro";
  if(level >= 5) badge = "🥇 Master";

  document.getElementById("badge").innerText = badge;
}

let lessons = {
  1: [
    {text:"Choose a sprite",img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Scratch_cat.png",task:"Add a sprite"},
    {text:"Add movement",img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Scratch_move_block.png",task:"Move 10 steps"},
    {text:"Add controls",img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Scratch_event_block.png",task:"Use flag"}
  ],
  2: [
    {text:"Choose character",img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Scratch_cat.png",task:"Pick one"},
    {text:"Add motion",img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Scratch_move_block.png",task:"Make it move"},
    {text:"Add costumes",img:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Scratch_costume.png",task:"Change look"}
  ],
  3: [
    {text:"Pick characters",img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/Scratch_cat.png",task:"Add 2"},
    {text:"Add dialogue",img:"https://upload.wikimedia.org/wikipedia/commons/8/8f/Scratch_say_block.png",task:"Make talk"},
    {text:"Use events",img:"https://upload.wikimedia.org/wikipedia/commons/5/5c/Scratch_event_block.png",task:"Start flag"}
  ]
};

let currentLesson = [];
let step = 0;

function startLesson(type){
  currentLesson = lessons[type];
  step = 0;
  showStep();
}

function nextStep(){
  step++;
  if(step < currentLesson.length){
    showStep();
    xp++;
    localStorage.setItem("xp", xp);
    level = Math.floor(xp / 10) + 1;
    updateUI();
  } else {
    document.getElementById("lessonText").innerHTML = "🎉 Lesson completed!";
    xp += 5;
    localStorage.setItem("xp", xp);
    level = Math.floor(xp / 10) + 1;
    updateUI();
  }
}

function showStep(){
  let s = currentLesson[step];
  document.getElementById("lessonText").innerHTML = `
    <h3>${s.text}</h3>
    <img src="${s.img}" width="120"><br>
    <b>Mission:</b> ${s.task}
  `;
}
</script>

</body>
</html>
