<!DOCTYPE html>
<html>
<head>
<title>🔥 Ultimate Game Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
.header{background:#ff7b00;padding:15px;text-align:center}
.card{background:#222;margin:10px;padding:15px;border-radius:10px}
button{padding:8px;background:#ff7b00;border:none;color:#fff;border-radius:8px;margin:5px}
input{padding:8px;border-radius:8px;border:none;margin:5px}
canvas{width:100%;background:#000}
</style>
</head>

<body>

<div class="header">🔥 Ultimate Platform</div>

<!-- ACCOUNT -->
<div class="card">
<h3>🌍 Account</h3>
<input id="username" placeholder="Enter name">
<button onclick="login()">Enter</button>
<p id="welcome"></p>
</div>

<!-- CHAT -->
<div class="card">
<h3>💬 Global Chat</h3>
<div id="chatBox" style="height:120px;overflow:auto;background:#000;padding:10px"></div>
<input id="chatInput">
<button onclick="sendMsg()">Send</button>
</div>

<!-- FRIENDS -->
<div class="card">
<h3>👥 Friends</h3>
<input id="friendName">
<button onclick="addFriend()">Add</button>
<div id="friendsList"></div>
</div>

<!-- PRIVATE CHAT -->
<div class="card">
<h3>💬 Private Chat</h3>
<p id="chatWith"></p>
<div id="privateBox" style="height:120px;overflow:auto;background:#000"></div>
<input id="privateInput">
<button onclick="sendPrivate()">Send</button>
</div>

<!-- GAME -->
<div class="card">
<h3>🎮 Game</h3>
<canvas id="game" height="300"></canvas>
<p id="score"></p>
</div>

<!-- SHOP -->
<div class="card">
<h3>🛍️ Skins</h3>
<button onclick="buySkin('orange',0)">Default</button>
<button onclick="buySkin('blue',10)">Blue</button>
<button onclick="buySkin('green',20)">Green</button>
<p id="skinStatus"></p>
</div>

<!-- 3D -->
<div class="card">
<h3>🌌 3D Mode</h3>
<canvas id="threeD" height="200"></canvas>
<button onclick="start3D()">Start</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rtdb = getDatabase(app);

// SAVE SCORE
window.saveScoreOnline = async (name, score)=>{
  await addDoc(collection(db,"scores"),{name,score});
};

// GLOBAL CHAT
onValue(ref(rtdb,"chat"), snap=>{
  let box=document.getElementById("chatBox");
  box.innerHTML="";
  let data=snap.val()||{};
  for(let id in data){
    let m=data[id];
    box.innerHTML+=`<p><b>${m.user}:</b> ${m.msg}</p>`;
  }
});

// SEND MESSAGE (WITH FILTER)
window.sendMsg=()=>{
  let msg=document.getElementById("chatInput").value;
  if(!msg||!window.user)return;

  if(isBad(msg)){
    alert("🚫 Bad word blocked");
    return;
  }

  push(ref(rtdb,"chat"),{user:window.user,msg});
};

// FRIENDS
window.addFriend=()=>{
  let f=document.getElementById("friendName").value;
  if(!f)return;
  let list=document.getElementById("friendsList");
  list.innerHTML+=`<p onclick="selectFriend('${f}')">${f}</p>`;
};

// PRIVATE CHAT
window.currentFriend="";
window.selectFriend=(f)=>{
  currentFriend=f;
  document.getElementById("chatWith").innerText="Chat with "+f;

  onValue(ref(rtdb,"dm/"+user+"_"+f), snap=>{
    let box=document.getElementById("privateBox");
    box.innerHTML="";
    let data=snap.val()||{};
    for(let id in data){
      let m=data[id];
      box.innerHTML+=`<p>${m.user}: ${m.msg}</p>`;
    }
  });
};

window.sendPrivate=()=>{
  let msg=document.getElementById("privateInput").value;
  if(!msg||!currentFriend)return;

  push(ref(rtdb,"dm/"+user+"_"+currentFriend),{
    user:user,msg:msg
  });
};
</script>

<script>
// BAD WORD FILTER
function isBad(text){
  let bad=["bad","xxx","hack"];
  return bad.some(w=>text.toLowerCase().includes(w));
}

// ACCOUNT
window.user=localStorage.getItem("user")||"";
function login(){
  user=document.getElementById("username").value;
  localStorage.setItem("user",user);
  document.getElementById("welcome").innerText="Hi "+user;
}

// XP
let xp=parseInt(localStorage.getItem("xp")||0);

// SHOP
let skin=localStorage.getItem("skin")||"orange";
function buySkin(s,c){
  if(xp>=c){
    xp-=c;
    skin=s;
    localStorage.setItem("skin",s);
  }
}

// GAME
let c=document.getElementById("game");
let ctx=c.getContext("2d");
let p={x:130,y:260};
let bullets=[],enemies=[],score=0,lives=3;

setInterval(()=>{enemies.push({x:Math.random()*260,y:0})},1000);

function draw(){
ctx.clearRect(0,0,300,300);

ctx.fillStyle=skin;
ctx.fillRect(p.x,p.y,40,20);

ctx.fillStyle="yellow";
bullets.forEach((b,i)=>{b.y-=5;ctx.fillRect(b.x,b.y,5,10)});

ctx.fillStyle="red";
enemies.forEach((e,i)=>{
e.y+=2;
ctx.fillRect(e.x,e.y,20,20);

bullets.forEach((b,bi)=>{
if(b.x<e.x+20&&b.x+5>e.x&&b.y<e.y+20&&b.y+10>e.y){
enemies.splice(i,1);
bullets.splice(bi,1);
score++;
}
});

if(e.y>260){lives--;}
});

document.getElementById("score").innerText="Score:"+score+" ❤️"+lives;

if(lives<=0){
  let n=prompt("Name:");
  if(n) saveScoreOnline(n,score);
  location.reload();
}

requestAnimationFrame(draw);
}

document.addEventListener("keydown",(e)=>{
if(e.key=="ArrowLeft")p.x-=10;
if(e.key=="ArrowRight")p.x+=10;
if(e.key==" ")bullets.push({x:p.x+15,y:p.y});
});

draw();

// 3D
function start3D(){
let c=document.getElementById("threeD");
let ctx=c.getContext("2d");
let x=100;

function d(){
ctx.clearRect(0,0,300,200);
ctx.fillStyle="cyan";
ctx.fillRect(x,100,50,50);
x+=1;
requestAnimationFrame(d);
}
d();
}
</script>

</body>
</html>
